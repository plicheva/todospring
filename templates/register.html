{% extends "base.html" %}

{% block content %}
  <section class="list" style="max-width: 500px; margin: 2rem auto;">
    <h2>Регистрация</h2>
    {% if error %}
      <p style="color: #b91c1c;">{{ error }}</p>
    {% endif %}
    <form action="{{ url_for('register') }}" method="post" style="display: grid; gap: 0.75rem;">
      <label>
        Потребителско име
        <input type="text" name="username" required autocomplete="username" />
      </label>
      <label>
        Парола
        <input type="password" name="password" required autocomplete="new-password" />
      </label>
      <button type="submit">Създай акаунт</button>
      <p>Вече имате акаунт? <a href="{{ url_for('login') }}">Влезте</a></p>
    </form>
  </section>
{% endblock %}
